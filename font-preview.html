<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码字体预览 · Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fira+Code:wght@400;500;700&family=Source+Code+Pro:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f7f3ec;
    color: #26211c;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    padding: 40px 24px;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .sub {
    color: #5b5249;
    font-size: 15px;
    margin-bottom: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 24px;
    max-width: 1400px;
  }
  .card {
    background: #fffdf8;
    border: 1px solid #e3dccf;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(38,33,28,0.04), 0 8px 24px -12px rgba(38,33,28,0.12);
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 2px 4px rgba(38,33,28,0.05), 0 18px 40px -20px rgba(38,33,28,0.22);
    transform: translateY(-2px);
  }
  .card.selected {
    border-color: #d9480f;
    box-shadow: 0 0 0 2px #d9480f, 0 8px 28px -10px rgba(217,72,15,0.45);
  }
  .card.selected::after {
    content: '✓ 选择';
    position: absolute;
    top: 12px;
    right: 12px;
    background: #d9480f;
    color: #fffdf8;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .card-header {
    padding: 16px 20px 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .card-name { font-weight: 600; font-size: 17px; }
  .card-meta { color: #938778; font-size: 12px; }
  .gem {
    margin: 8px 16px;
    background: #211d2b;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #3a3347;
  }
  .gem-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid #3a3347;
    background: #1a1723;
  }
  .gem-bar-text {
    margin-left: 6px;
    font-size: 11px;
    color: #8b8499;
    letter-spacing: 0.03em;
  }
  .gem-body {
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    color: #e7e2f0;
  }
  .kw { color: #ff9e64; }
  .ty { color: #7dcfb6; }
  .st { color: #e0af68; }
  .nu { color: #d6a4ff; }
  .cm { color: #6b6580; font-style: italic; }
  .fn { color: #ffd866; }
  .pn { color: #a59ec0; }
  .note {
    padding: 10px 20px 16px;
    font-size: 13px;
    line-height: 1.5;
    color: #5b5249;
  }
  .note code {
    padding: 1px 6px;
    border-radius: 4px;
    background: #efe9df;
    font-size: 13px;
  }
  .actions {
    margin-top: 28px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: #d9480f;
    color: #fffdf8;
    box-shadow: 0 8px 28px -10px rgba(217,72,15,0.45);
  }
  .btn-primary:hover { background: #e8590c; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  #result {
    font-size: 14px;
    color: #4d7c4f;
    font-weight: 600;
  }
</style>
</head>
<body>
  <h1>选择代码字体</h1>
  <p class="sub">点选你看着最清晰的字体，然后告诉我名字</p>

  <div class="grid" id="fontGrid"></div>

  <div class="actions">
    <button class="btn btn-primary" id="confirmBtn">告诉我选了什么</button>
    <span id="result"></span>
    <span style="font-size:13px;color:#938778">当前: <strong style="color:#26211c">JetBrains Mono</strong></span>
  </div>

<script>
const SAMPLES = [
  'int health = 100;',
  'float speed = 1.5f;',
  'FString Name = TEXT("Hello");',
  'if (health > 0 && score >= 50) {',
  '  UE_LOG(LogTemp, Warning, TEXT("%f"), dmg);',
  '  for (int i = 0; i < 3; i++) {',
  '    score += i * 2;',
  '  }',
  '}',
  '// 这是一行注释',
]

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function highlightLine(line) {
  if (/^\s*\/\//.test(line)) {
    return `<span class="cm">${escHtml(line)}</span>`
  }

  const types = [
    { re: /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/, cls: 'st' },
    { re: /\b\d[\d.fF]*\b/, cls: 'nu' },
    { re: /\b(?:UFUNCTION|UPROPERTY|BlueprintCallable|BlueprintReadWrite|EditAnywhere|Category)\b/, cls: 'fn' },
    { re: /\b(?:int|float|double|char|bool|void|auto|long|short|unsigned|signed|size_t|string|wchar_t|int32|uint8|uint32|int8|int16|uint16|int64|uint64)\b/, cls: 'ty' },
    { re: /\b(?:FString|TArray|TMap|TSet|TQueue|FName|FText|FVector|FRotator|FTransform|UObject|AActor|APawn|ACharacter|UClass)\b/, cls: 'ty' },
    { re: /\b(?:UE_LOG)\b/, cls: 'fn' },
    { re: /\b(?:if|else|for|while|do|return|break|continue|class|struct|enum|namespace|template|virtual|override|const|static|public|private|protected|new|delete|throw|try|catch|using|typedef|typename|true|false|nullptr|constexpr|noexcept|inline|export|friend|mutable|register|sizeof|this|union|volatile|goto|case|switch|default|extern)\b/, cls: 'kw' },
    { re: /\b[A-Za-z_]\w*(?=\s*\()/, cls: 'fn' },
  ]

  const reAll = new RegExp(
    types.map(t => t.re.source).join('|'),
    'g'
  )

  const clsMap = []
  let idx = 0
  for (const t of types) {
    for (let i = 0; i < t.re.source.length; i++) {
      clsMap.push(t.cls)
    }
    idx++
  }

  let result = ''
  let last = 0
  let match

  while ((match = reAll.exec(line)) !== null) {
    if (match.index > last) {
      result += escHtml(line.slice(last, match.index))
    }

    const matchedText = match[0]
    // Determine which group matched
    let matchedCls = null
    for (let i = 1; i < match.length; i++) {
      if (match[i] !== undefined) {
        matchedCls = types[i - 1].cls
        break
      }
    }

    if (matchedCls) {
      result += `<span class="${matchedCls}">${escHtml(matchedText)}</span>`
    } else {
      result += escHtml(matchedText)
    }
    last = match.index + matchedText.length
  }
  if (last < line.length) {
    result += escHtml(line.slice(last))
  }
  return result
}

const fonts = [
  {
    name: 'JetBrains Mono',
    family: "'JetBrains Mono', monospace",
    note: '当前字体。窄字宽，代码聚焦感强。',
    isCurrent: true,
  },
  {
    name: 'Fira Code',
    family: "'Fira Code', monospace",
    note: '宽字距，可读性高，支持编程连字（→ ≥ !=）。',
    isCurrent: false,
  },
  {
    name: 'Source Code Pro',
    family: "'Source Code Pro', monospace",
    note: 'Adobe 出品，字腔开阔，标点清晰，长时间阅读不累。',
    isCurrent: false,
  },
  {
    name: 'IBM Plex Mono',
    family: "'IBM Plex Mono', monospace",
    note: 'IBM 出品，字型中性端正，0/O 区分明显。',
    isCurrent: false,
  },
  {
    name: 'Noto Sans Mono',
    family: "'Noto Sans Mono', monospace",
    note: 'Google 出品，中日韩字符支持完整，中英文混排最和谐。',
    isCurrent: false,
  },
]

const grid = document.getElementById('fontGrid')
let selectedFont = null
const confirmBtn = document.getElementById('confirmBtn')
const resultDiv = document.getElementById('result')

fonts.forEach(f => {
  const card = document.createElement('div')
  card.className = 'card'
  if (f.isCurrent) card.classList.add('selected')

  const codeHTML = SAMPLES.map(line => `<div>${highlightLine(line)}</div>`).join('')

  card.innerHTML = `
    <div class="card-header">
      <span class="card-name">${f.name}</span>
      <span class="card-meta">${f.isCurrent ? '当前' : ''}</span>
    </div>
    <div class="gem">
      <div class="gem-bar">
        <span class="gem-bar-text">main.cpp</span>
      </div>
      <div class="gem-body" style="font-family:${f.family};font-weight:400">${codeHTML}</div>
    </div>
    <div class="note">
      <code style="font-family:${f.family}">int health = 100;</code>
      <span> — 行内代码效果</span>
      <br>
      <span style="font-size:12px;color:#938778;margin-top:4px;display:inline-block">${f.note}</span>
    </div>
  `

  card.addEventListener('click', () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'))
    card.classList.add('selected')
    selectedFont = f.name
    confirmBtn.disabled = false
    resultDiv.textContent = `已选: ${f.name}`
  })

  grid.appendChild(card)
})

confirmBtn.addEventListener('click', () => {
  if (!selectedFont) {
    const sel = document.querySelector('.card.selected')
    selectedFont = sel ? sel.querySelector('.card-name').textContent : 'JetBrains Mono'
  }
  resultDiv.innerHTML = `✅ 已确认: <strong>${selectedFont}</strong> — 请把字体名发给我，我帮你换上`
  confirmBtn.disabled = true
})
</script>
</body>
</html>
